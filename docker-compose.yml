version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: applyme
      POSTGRES_PASSWORD: applyme
      POSTGRES_DB: applyme
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U applyme']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
